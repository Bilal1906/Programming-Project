<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: Arial, sans-serif;
        }

        .topbar {
            height: 60px;
            background-color: #808080;
            width: 100%;
        }

        .sidebar {
            position: fixed;
            top: 60px;
            left: 0;
            width: 200px;
            height: calc(100vh - 60px);
            background-color: #808080;
        }

        .content {
            margin-left: 200px;
            margin-top: 60px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="topbar"></div>

    <div class="sidebar"></div>

    <div class="content">
    </div>

    <script src="main.js"></script>
</body>
</html>
